<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade-Coude</title>

<body>
    <form action="#" method="post">
        <select name="" id=""></select>

        <label for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" placeholder="seu nome completo" required>
    </form>
    <form action="">

        <label for="email">email</label>
        <input type="email" name="email" id="text" placeholder="emailexemplo@gmail.com">
    </form>
        <label for="telefóne">numero</label>
        <input id="telefone" name="telefone" type="tel" pattern="[0-9]{10,11}" placeholder="numero de telefone">
        <form action="">

            <label for="date">data de nascimento</label>
            <input type="date" name="" id="" placeholder="">
        </form>
        <form action="">

            <label for="text">Area de interesse</label>
            <input type="text">
        </form>
        <form action="">

            <label for="SexoM">masculino</label>
            <input type="radio" name="sexo" id="SexoM" value="masc">
            <label for="SexoF">Feminino</label>
            <input type="radio" name="sexo" id="SexoF" value="fem">
        </form>
        <form action="">

            <input type="submit" value="enviar">
            <input type="reset" value="apagar">
        </form>
        <form action="">
            <textarea name="area de texto" id=""></textarea maxlength>
        </form>
        
</body>
</html>
